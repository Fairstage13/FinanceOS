<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fairstage Finance OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --fs-deep: #0f0e26;
            --fs-mint: #4db696;
            --fs-border: rgba(255, 255, 255, 0.12);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0e26;
            color: white;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #bg-video {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100vw;
            min-height: 100vh;
            width: auto; height: auto;
            object-fit: cover;
            z-index: 0;
            opacity: 0.35;
        }

        #bg-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(15, 14, 38, 0.85) 0%,
                rgba(15, 14, 38, 0.60) 50%,
                rgba(15, 14, 38, 0.90) 100%
            );
            z-index: 1;
        }

        .login-card {
            position: relative;
            z-index: 10;
            background: rgba(15, 14, 38, 0.75);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--fs-border);
            border-radius: 28px;
            padding: 48px 44px;
            width: 100%;
            max-width: 420px;
            margin: 20px;
            box-shadow:
                0 0 0 1px rgba(77, 182, 150, 0.08),
                0 40px 80px rgba(0, 0, 0, 0.6),
                0 0 120px rgba(77, 182, 150, 0.04);
            animation: fadeUp 0.6s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 36px;
        }
        .logo-wrap img { height: 44px; width: auto; }
        .logo-fallback {
            font-size: 18px; font-weight: 700;
            letter-spacing: 0.12em; text-transform: uppercase;
            color: var(--fs-mint);
        }

        .login-title { text-align: center; margin-bottom: 32px; }
        .login-title h1 {
            font-size: 15px; font-weight: 700;
            letter-spacing: 0.18em; text-transform: uppercase;
            color: rgba(255,255,255,0.9); margin-bottom: 6px;
        }
        .login-title p { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 0.06em; }

        .divider {
            width: 40px; height: 2px; background: var(--fs-mint);
            border-radius: 2px; margin: 0 auto 32px; opacity: 0.6;
        }

        .input-wrap { position: relative; margin-bottom: 16px; }
        .input-wrap label {
            display: block; font-size: 9px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.12em;
            color: rgba(255,255,255,0.35); margin-bottom: 8px;
        }
        .input-wrap input {
            width: 100%; background: rgba(0, 0, 0, 0.45);
            border: 1px solid var(--fs-border); border-radius: 12px;
            padding: 14px 48px 14px 16px; font-size: 14px;
            font-weight: 600; color: white; letter-spacing: 0.12em;
            outline: none; transition: border-color 0.25s, box-shadow 0.25s;
            font-family: 'Inter', sans-serif;
        }
        .input-wrap input::placeholder { color: rgba(255,255,255,0.15); letter-spacing: 0.06em; font-weight: 400; }
        .input-wrap input:focus {
            border-color: rgba(77, 182, 150, 0.5);
            box-shadow: 0 0 0 3px rgba(77, 182, 150, 0.08);
        }

        .toggle-eye {
            position: absolute; right: 14px; bottom: 14px;
            cursor: pointer; opacity: 0.3; transition: opacity 0.2s;
            font-size: 16px; user-select: none;
        }
        .toggle-eye:hover { opacity: 0.7; }

        #error-msg {
            display: none;
            background: rgba(255, 80, 80, 0.08);
            border: 1px solid rgba(255, 80, 80, 0.25);
            border-radius: 10px; padding: 10px 14px;
            font-size: 11px; color: #ff8070;
            text-align: center; margin-bottom: 16px;
            animation: shake 0.35s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        #btn-login {
            width: 100%; background: var(--fs-mint); color: #0f0e26;
            border: none; border-radius: 12px; padding: 15px;
            font-size: 11px; font-weight: 800; letter-spacing: 0.16em;
            text-transform: uppercase; cursor: pointer;
            transition: all 0.2s; margin-top: 8px;
            font-family: 'Inter', sans-serif;
        }
        #btn-login:hover {
            background: #5fcba6; transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(77, 182, 150, 0.3);
        }
        #btn-login:active { transform: scale(0.98) translateY(0); }
        #btn-login.loading { opacity: 0.6; cursor: not-allowed; transform: none; }

        .login-footer {
            text-align: center; margin-top: 28px; font-size: 9px;
            color: rgba(255,255,255,0.15); letter-spacing: 0.08em; text-transform: uppercase;
        }

        .dot {
            position: fixed; width: 3px; height: 3px;
            background: var(--fs-mint); border-radius: 50%;
            opacity: 0; z-index: 2; animation: floatDot linear infinite;
        }
        @keyframes floatDot {
            0%   { opacity: 0; transform: translateY(0) scale(1); }
            10%  { opacity: 0.4; }
            90%  { opacity: 0.1; }
            100% { opacity: 0; transform: translateY(-80px) scale(0.5); }
        }
    </style>
</head>
<body>
    <video id="bg-video" autoplay muted loop playsinline>
        <source src="background.mp4" type="video/mp4">
    </video>
    <div id="bg-overlay"></div>

    <div class="dot" style="left:15%; bottom:20%; width:4px;height:4px; animation-duration:8s; animation-delay:0s;"></div>
    <div class="dot" style="left:30%; bottom:10%; animation-duration:11s; animation-delay:2s;"></div>
    <div class="dot" style="left:55%; bottom:15%; width:2px;height:2px; animation-duration:9s; animation-delay:1s;"></div>
    <div class="dot" style="left:70%; bottom:25%; animation-duration:13s; animation-delay:3s;"></div>
    <div class="dot" style="left:85%; bottom:8%; width:4px;height:4px; animation-duration:10s; animation-delay:0.5s;"></div>
    <div class="dot" style="left:42%; bottom:5%; width:2px;height:2px; animation-duration:12s; animation-delay:4s;"></div>

    <div class="login-card">
        <div class="logo-wrap">
            <img src="Logo.png" alt="Fairstage"
                onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='block';">
            <span id="logo-fallback" class="logo-fallback" style="display:none;">Fairstage</span>
        </div>

        <div class="login-title">
            <h1>Finance OS</h1>
            <p>Área restrita · Acesso autorizado</p>
        </div>
        <div class="divider"></div>

        <div id="error-msg">Senha incorreta. Tente novamente.</div>

        <div class="input-wrap">
            <label>Senha de acesso</label>
            <input type="password" id="password" placeholder="••••••••"
                autocomplete="current-password"
                onkeydown="if(event.key==='Enter') doLogin()">
            <span class="toggle-eye" onclick="toggleEye()" id="eye-icon">👁</span>
        </div>

        <button id="btn-login" onclick="doLogin()">Entrar no Sistema</button>

        <div class="login-footer">Fairstage Intelligence Audiovisual &nbsp;·&nbsp; 2026</div>
    </div>

    <script>
        const SENHA = 'Fair2026';

        function doLogin() {
            const input = document.getElementById('password');
            const btn   = document.getElementById('btn-login');
            const err   = document.getElementById('error-msg');
            const val   = input.value;

            if (!val) { input.focus(); return; }

            if (val === SENHA) {
                btn.textContent = 'Autenticando...';
                btn.classList.add('loading');
                err.style.display = 'none';
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 600);
            } else {
                err.style.display = 'block';
                err.style.animation = 'none';
                err.offsetHeight;
                err.style.animation = '';
                input.value = '';
                input.focus();
                input.style.borderColor = 'rgba(255,80,80,0.6)';
                input.style.boxShadow   = '0 0 0 3px rgba(255,80,80,0.08)';
                setTimeout(() => { input.style.borderColor = ''; input.style.boxShadow = ''; }, 1200);
            }
        }

        function toggleEye() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eye-icon');
            if (input.type === 'password') { input.type = 'text'; icon.textContent = '🙈'; }
            else { input.type = 'password'; icon.textContent = '👁'; }
        }
    </script>
</body>
</html>
